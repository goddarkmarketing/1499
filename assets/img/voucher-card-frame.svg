<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sleeveGrad" x1="90" y1="0" x2="90" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5fd4ff"/>
      <stop offset="45%" stop-color="#1eb0f0"/>
      <stop offset="100%" stop-color="#0a8fd8"/>
    </linearGradient>
    <linearGradient id="sleeveShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".45"/>
      <stop offset="35%" stop-color="#fff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#041e4a" flood-opacity=".28"/>
    </filter>
    <clipPath id="sleeveClip">
      <path d="M24 0 H168 Q188 100 168 200 H24 Q0 200 0 176 V24 Q0 0 24 0 Z"/>
    </clipPath>
  </defs>
  <g filter="url(#cardShadow)">
    <!-- white card body -->
    <path d="M158 8 H496 Q520 8 520 32 V168 Q520 192 496 192 H158 Q178 100 158 8 Z" fill="#fff"/>
    <path d="M158 8 H496 Q520 8 520 32 V168 Q520 192 496 192 H158 Q178 100 158 8 Z" stroke="#e8eef5" stroke-width="1"/>
    <!-- blue sleeve -->
    <path d="M24 0 H168 Q188 100 168 200 H24 Q0 200 0 176 V24 Q0 0 24 0 Z" fill="url(#sleeveGrad)"/>
    <path d="M24 0 H168 Q188 100 168 200 H24 Q0 200 0 176 V24 Q0 0 24 0 Z" stroke="#0890d4" stroke-width="1" opacity=".35"/>
    <rect x="0" y="0" width="168" height="72" fill="url(#sleeveShine)" clip-path="url(#sleeveClip)"/>
    <!-- inset logo frame -->
    <rect x="52" y="44" width="92" height="92" rx="18" fill="#fff" stroke="#b8e8ff" stroke-width="3"/>
    <rect x="58" y="50" width="80" height="80" rx="14" fill="#fff" stroke="#dff4ff" stroke-width="2"/>
  </g>
</svg>
